
set  -g default-terminal "tmux-256color"
set  -g base-index      1
setw -g pane-base-index 1
# We need to set default-shell before calling new-session
set  -g default-shell "/nix/store/kwmvhsz9pw61an4ppqfrhjnpjshikvjs-zsh-5.9/bin/zsh"





set -g status-keys vi
set -g mode-keys   vi







set  -g mouse             on
set  -g focus-events      off
setw -g aggressive-resize off
setw -g clock-mode-style  24
set  -s escape-time       0
set  -g history-limit     100000

# ============================================= #
# Load plugins with Home Manager                #
# --------------------------------------------- #

# tmuxplugin-sensible
# ---------------------

run-shell /nix/store/ama09bjkjw35qnihrg4fhzvpavxmrydx-tmuxplugin-sensible-unstable-2022-08-14/share/tmux-plugins/sensible/sensible.tmux


# tmuxplugin-yank
# ---------------------

run-shell /nix/store/674kj1qsrs12gp06rq6xbgs8w3iydvrn-tmuxplugin-yank-unstable-2023-07-19/share/tmux-plugins/yank/yank.tmux


# tmuxplugin-vim-tmux-navigator
# ---------------------

run-shell /nix/store/2hs8pagi2xc9qzrrrqc14dllzshf9w0q-tmuxplugin-vim-tmux-navigator-unstable-2025-07-15/share/tmux-plugins/vim-tmux-navigator/vim-tmux-navigator.tmux

# ============================================= #

set -g renumber-windows on
set -g focus-events on
set -g detach-on-destroy off
set -g allow-passthrough on

# Use Ctrl+a as prefix
unbind C-b

set -g prefix C-a
bind C-a send-prefix

# True colour / modern terminal support.
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -as terminal-features ",xterm-ghostty:RGB,extkeys"
set -as terminal-features ",ghostty:RGB,extkeys"

# Extended keyboard support for Ghostty / Claude Code / modern TUIs.
set -s extended-keys always
set -s extended-keys-format csi-u

# Shift+Enter for Claude Code inside tmux.
bind -n S-Enter send-keys Escape "[13;2u"

# OSC 52 clipboard over SSH.
set -g set-clipboard on

# Easier splits.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config.
bind r source-file /Users/richardsmith/dev/env/tmp/tmux.conf \; display-message "tmux config reloaded"

# Pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar
set -g status-position bottom
set -g status-left "#S "
set -g window-status-format "#{window_index}:#{window_name} "
set -g window-status-current-format "[#{window_index}:#{window_name}] "
set -g status-right "#h"
set -g status-left-length 32
set -g status-right-length 32
set -g status-interval 60

# Styling
set -g status-style 'bg=#{?client_prefix,#ff0000,#1e1e2e}'
